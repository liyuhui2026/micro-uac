apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-uac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-uac
  template:
    metadata:
      labels:
        app: micro-uac
    spec:
      imagePullSecrets:
        - name: imagepullsecret-rte-sec
      containers:
        - name: micro-uac
          image: hub-master.agoralab.co/rte-serverless/micro-uac:1.0.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - >
              sed "s|\${POD_IP}|${POD_IP}|g" /app/config-template/config.template.json > /app/config.json
              && exec /app/micro-uac-server -config /app/config.json
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: sip-udp
              containerPort: 5061
              protocol: UDP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config-template
              mountPath: /app/config-template
              readOnly: true
            - name: runtime
              mountPath: /app/.runtime
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config-template
          configMap:
            name: micro-uac-config
        - name: runtime
          emptyDir: {}


python3 create_call.py \
    --from-number 1010 \
    --to-number 9200711 \
    --target-number 13729020276 \
    --fs-addr 10.167.128.24:5060 \
    --line-addr icc.icsoc.net:5066